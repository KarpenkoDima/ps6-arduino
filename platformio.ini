[platformio]
description = Будильник на Arduino с двумя индикаторами.

; ── Реальное железо: DS1302 (3-wire) + DHT11 ────────────────────────────────
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
lib_deps =
	marcoschwartz/LiquidCrystal_I2C
	https://github.com/msparks/arduino-ds1302.git
	EEPROM
	adafruit/DHT sensor library @ ^1.4.6
	adafruit/Adafruit Unified Sensor @ ^1.1.14

; ── Wokwi-симулятор: DS1307 (I2C) + DHT22 ───────────────────────────────────
; Собери командой: pio run -e wokwi
; Прошивка для Wokwi: .pio/build/wokwi/firmware.hex
[env:wokwi]
platform = atmelavr
board = uno
framework = arduino
build_flags =
	-DUSE_DS1307
	-DDHT_TYPE=DHT22
lib_deps =
	marcoschwartz/LiquidCrystal_I2C
	EEPROM
	adafruit/DHT sensor library @ ^1.4.6
	adafruit/Adafruit Unified Sensor @ ^1.1.14
